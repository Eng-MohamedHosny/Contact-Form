<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- displays site properly based on user's device -->

		<link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png" />
		<!-- Style File -->
		<link rel="stylesheet" href="style.css" />
		<title>Frontend Mentor | Contact form</title>
		<!-- Font -->
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link href="https://fonts.googleapis.com/css2?family=Karla:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet" />
	</head>
	<body>
		<div class="modal">
				<div class="confirmation ">
					<img src="assets/images/icon-success-check.svg" alt="">
					<p>Message Sent!</p>
				</div>
				<p>Thanks for completing the form. We’ll be in touch soon!</p>
			</div>

		<main class="container">
			<h1>Contact Us</h1>
			<form action="" method="post" novalidate>

				<div class="fields">
					<div class="side-by-side ">
						<div class="first-name text-field">
							<label for="firstName" >First Name</label>
							<input type="text" name="firstName" id="firstName" required>
							<p class="error-message hidden">This field is required</p>
						</div>
						<div class="last-name text-field">
							<label for="lastName" >Last Name</label>
							<input type="text" id="lastName" name="lastName" required>
							<p class="error-message hidden">This field is required</p>
						</div>
					</div>
					
					<div class="email text-field">
						<label for="email" >Email Address</label>
						<input type="email" id="email" name="email" required>
						<p class="error-message hidden">Please enter a valid email address</p>
					</div>

					<div class="radio-field">
						<label for=""  >Query Type</label>
						
						<div class="radio-options">
							<!-- NOTE the right way to make a radio option -->
							 <!-- NOTE we need only to add required to the first radio
							  and then the browser will read all the group as required -->
							<label class="radio-option">
								<input type="radio" name="enquiryType" value="general request" required>
								General Enquiry
							</label>
							<label class="radio-option">
								<input type="radio" name="enquiryType" value="support Request" >
								Support Request
							</label>
						</div>

						<p class="error-message hidden">Please select a query type</p>
					</div>

					<div class="message text-field">
						<label for="message" >Message</label>
						<textarea name="message" rows="8" id="message" required ></textarea>
						<p class="error-message hidden">This field is required</p>
					</div>
				</div>

				<div class="checkbox-field">
					<div class="checkbox-row">
						<input type="checkbox" name="consent" id="checkbox" required>
						<label for="checkbox">
							I consent to being contacted by the team
						</label>
					</div>
					<p class="error-message hidden">
					  To submit this form, please consent to being contacted
					</p>
				</div>
					<button type="submit">Submit</button>
				</form>
			</main>
			
			
			
			<script src="script.js"></script>
		</body>
		</html>
